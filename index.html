<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Landing Page Versions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      text-align: center;
    }

    .container {
      background: rgba(0, 0, 0, 0.3);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-bottom: 30px;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      text-decoration: none;
      color: #333;
      background: white;
      transition: 0.3s ease;
      width: 220px;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #222;
      color: white;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🚀 Landing Page Versions</h1>
    <p>Select a version to view</p>

    <a href="v1/index.html" target="_blank" class="btn">View Version 1</a>
    <a href="v2/index.html" target="_blank" class="btn">View Version 2</a>


  </div>

</body>
</html>
